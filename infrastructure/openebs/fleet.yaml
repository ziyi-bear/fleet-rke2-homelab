defaultNamespace: openebs
labels:
  app: openebs

helm:
  repo: https://openebs.github.io/openebs
  chart: openebs
  releaseName: openebs
  # Pin to a stable version (e.g., 4.1.0)
  version: 4.5.1
  values: 
    # Disable volume snapshots to avoid conflicts with existing cluster CRDs (rke2-snapshot-controller)
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false
    # Configure storage engines: enable ZFS and disable LVM/Mayastor
    engines:
      local:
        zfs:
          enabled: true
        lvm:
          enabled: false
      # Disable the replicated storage engine (Mayastor) to avoid pre-upgrade hook and resource failures
      replicated:
        mayastor:
          enabled: false
    # Disable telemetry/observability collectors (Alloy & Loki) as they are only needed for Mayastor
    alloy:
      enabled: false
    loki:
      enabled: false
    # Disable MinIO and NATS as they serve as backing storage/message bus dependencies for Mayastor/Loki
    minio:
      enabled: false
    nats:
      enabled: false
